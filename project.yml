name: StudentCourseManager

options:
  bundleIdPrefix: com.studentapp
  deploymentTarget:
    iOS: "16.0"

targets:
  StudentCourseManager:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Services
      - ViewModels
      - Views
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studentapp.coursemanager
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        CODE_SIGNING_ALLOWED: NO
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SDKROOT: iphoneos
        TARGETED_DEVICE_FAMILY: "1,2"
